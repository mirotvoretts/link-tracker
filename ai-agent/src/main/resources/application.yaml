server:
  port: 8082

spring:
  application:
    name: ai-agent
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      group-id: ai-agent-consumer
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.type.mapping: "rawUpdate:backend.academy.linktracker.ai.dto.RawUpdate"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

ai-agent:
  filtering:
    stop-words: []
    excluded-authors: []
    min-length: 0
  summarization:
    threshold: 500
  prioritization:
    high-keywords:
      - critical
      - urgent
      - breaking
      - security
    low-keywords:
      - minor
      - typo
      - chore
      - docs
  grouping:
    window-ms: 30000
