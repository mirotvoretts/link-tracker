spring:
  application:
    name: bot
  devtools:
    restart:
      enabled: false
  config:
    import: optional:file:.env[.properties]
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    schema-registry-url: ${KAFKA_SCHEMA_REGISTRY_URL:http://localhost:8081}
    consumer:
      group-id: ${KAFKA_GROUP_ID:bot-consumer}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.use.type.headers: false
        spring.json.value.default.type: backend.academy.linktracker.bot.dto.LinkUpdateRequest
      auto-offset-reset: earliest
    listener:
      ack-mode: manual_immediate
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8080

app:
  telegram:
    url: https://api.telegram.org/bot
    token: ${TELEGRAM_TOKEN:8070650984:AAHNGeOBkgLsSkBtJTxY8Zlbq6cEZ7vx1ac}
    update-listener-sleep: 1s
    debug: false
  scrapper:
    base-url: ${SCRAPPER_BASE_URL:http://localhost:8083}
  kafka:
    max-retries: 3
    initial-backoff-ms: 1000
    max-backoff-ms: 60000
    backoff-multiplier: 2.0

resilience4j:
  ratelimiter:
    instances:
      updates:
        limit-for-period: 5
        limit-refresh-period: 1s
        timeout-duration: 0

