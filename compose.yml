services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - tracker-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
      - "29092:29092"
    networks:
      - tracker-net

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: schema-registry
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_KAFKASTORE_SECURITY_PROTOCOL: PLAINTEXT
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_DEBUG: "true"
    networks:
      - tracker-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgresql:
    image: postgres:16
    container_name: postgresql
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scrapper}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATABASE: ${POSTGRES_DB:-scrapper}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tracker-net

  valkey-node-1:
    image: valkey/valkey:8-alpine
    container_name: valkey-node-1
    ports:
      - "6379:6379"
    command: ["valkey-server", "--port", "6379"]
    networks:
      - tracker-net
    healthcheck:
      test: ["CMD", "valkey-cli", "-p", "6379", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey-node-2:
    image: valkey/valkey:8-alpine
    container_name: valkey-node-2
    ports:
      - "6380:6380"
    command: ["valkey-server", "--port", "6380"]
    networks:
      - tracker-net
    healthcheck:
      test: ["CMD", "valkey-cli", "-p", "6380", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey-node-3:
    image: valkey/valkey:8-alpine
    container_name: valkey-node-3
    ports:
      - "6381:6381"
    command: ["valkey-server", "--port", "6381"]
    networks:
      - tracker-net
    healthcheck:
      test: ["CMD", "valkey-cli", "-p", "6381", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey-init:
    image: valkey/valkey:8-alpine
    container_name: valkey-init
    depends_on:
      valkey-node-1:
        condition: service_healthy
      valkey-node-2:
        condition: service_healthy
      valkey-node-3:
        condition: service_healthy
    networks:
      - tracker-net
    command: >
      sh -c "
        for i in 1 2 3 4 5; do
          echo 'Attempting cluster create (try '"$$i"')';
          valkey-cli --cluster create valkey-node-1:6379 valkey-node-2:6380 valkey-node-3:6381 --cluster-yes && break || sleep 2;
        done;
        echo 'valkey cluster init complete';
        tail -f /dev/null
      "
    restart: 'no'

networks:
  tracker-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  postgres_data:
